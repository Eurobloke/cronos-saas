<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body{font-family:Inter,system-ui,sans-serif;background:#0f172a;margin:0;padding:40px 20px;}
.card{background:#1e293b;border-radius:16px;max-width:560px;margin:0 auto;padding:40px;color:#e2e8f0;}
.btn{display:inline-block;background:#ef4444;color:white;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:700;margin:20px 0;}
p{color:#94a3b8;line-height:1.7;}
</style></head>
<body>
<div class="card">
  <h1 style="font-weight:900;margin-bottom:8px;">🔐 Restablecer contraseña</h1>
  <p>Hola {{ user.username }}, recibimos una solicitud para restablecer la contraseña de tu cuenta.</p>
  <p>Haz clic en el botón a continuación. El enlace es válido por <strong style="color:#e2e8f0;">1 hora</strong>.</p>
  <a href="{{ reset_url }}" class="btn">🔑 Cambiar contraseña</a>
  <p style="font-size:0.85rem;">Si no solicitaste esto, ignora este mensaje. Tu contraseña no cambiará.</p>
</div>
</body></html>
