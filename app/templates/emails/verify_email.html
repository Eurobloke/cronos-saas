<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body{font-family:Inter,system-ui,sans-serif;background:#0f172a;margin:0;padding:40px 20px;}
.card{background:#1e293b;border-radius:16px;max-width:560px;margin:0 auto;padding:40px;color:#e2e8f0;}
h1{font-size:1.6rem;font-weight:900;color:#e2e8f0;margin-bottom:8px;}
.btn{display:inline-block;background:#6366f1;color:white;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:700;margin:20px 0;}
p{color:#94a3b8;line-height:1.7;}
.link-box{background:#0f172a;border-radius:8px;padding:12px;font-size:0.8rem;word-break:break-all;color:#94a3b8;margin-top:16px;}
</style></head>
<body>
<div class="card">
  <h1>✉️ Verifica tu email</h1>
  <p>Hola {{ user.username }}, haz clic en el botón para verificar tu correo electrónico en <strong style="color:#e2e8f0;">{{ app_name }}</strong>:</p>
  <a href="{{ verify_url }}" class="btn">✅ Verificar email</a>
  <p style="font-size:0.85rem;">Este enlace expira en 24 horas. Si no creaste esta cuenta, ignora este mensaje.</p>
  <div class="link-box">{{ verify_url }}</div>
</div>
</body></html>
