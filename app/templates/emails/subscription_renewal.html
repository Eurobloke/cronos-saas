<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body{font-family:Inter,system-ui,sans-serif;background:#0f172a;margin:0;padding:40px 20px;}
.card{background:#1e293b;border-radius:16px;max-width:560px;margin:0 auto;padding:40px;color:#e2e8f0;}
p{color:#94a3b8;line-height:1.7;}
</style></head>
<body>
<div class="card">
  <h1 style="font-weight:900;color:#22c55e;margin-bottom:8px;">✅ Suscripción renovada</h1>
  <p>Hola {{ user.username }}, tu suscripción al plan <strong style="color:#e2e8f0;">{{ subscription.plan.name }}</strong> ha sido renovada.</p>
  <p>Tus créditos mensuales han sido añadidos a tu cuenta.</p>
  <p style="font-size:0.85rem;">Próxima renovación: {{ subscription.expires_at.strftime('%d/%m/%Y') if subscription.expires_at else 'N/A' }}</p>
</div>
</body></html>
