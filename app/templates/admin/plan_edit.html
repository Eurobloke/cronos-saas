{% extends 'base.html' %}
{% block title %}{{ 'Editar' if plan.id else 'Nuevo' }} plan — Admin{% endblock %}
{% block page_title %}{{ 'Editar' if plan.id else 'Crear nuevo' }} plan{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input name="name" class="form-control" value="{{ plan.name or '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Slug (único, sin espacios)</label>
        <input name="slug" class="form-control" value="{{ plan.slug or '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Precio mensual (USD)</label>
        <input name="price_monthly" type="number" step="0.01" class="form-control" value="{{ plan.price_monthly or 0 }}">
      </div>
      <div class="form-group">
        <label class="form-label">Precio anual (USD)</label>
        <input name="price_annual" type="number" step="0.01" class="form-control" value="{{ plan.price_annual or 0 }}">
      </div>
      <div class="form-group">
        <label class="form-label">Créditos por mes</label>
        <input name="credits_monthly" type="number" class="form-control" value="{{ plan.credits_monthly or 0 }}">
      </div>
      <div class="form-group">
        <label class="form-label">Orden de visualización</label>
        <input name="sort_order" type="number" class="form-control" value="{{ plan.sort_order or 0 }}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <input name="description" class="form-control" value="{{ plan.description or '' }}">
    </div>
    <div class="form-group">
      <label class="form-label">Características (una por línea)</label>
      <textarea name="features" class="form-control" rows="6" placeholder="100 créditos/mes&#10;Soporte por email&#10;5 canales">{{ '\n'.join(plan.get_features()) }}</textarea>
    </div>
    <div class="flex gap-3 mb-3">
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="is_active" {% if plan.is_active or not plan.id %}checked{% endif %}> Activo
      </label>
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="is_popular" {% if plan.is_popular %}checked{% endif %}> Marcar como popular
      </label>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary">💾 Guardar</button>
      <a href="{{ url_for('admin.plans') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
